<!DOCTYPE HTML>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E00L9PT3V9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E00L9PT3V9');
  </script>
  <title>{{ page.title }} | {{ site.name }}</title>

  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta name="author" content="{{ site.name }}" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" type="text/css">

  <style>
    body {
      overflow-x: hidden;
    }
    table {
      table-layout: fixed;
      width: 100%;
    }
    td {
      overflow-wrap: break-word;
      word-wrap: break-word;
      max-width: 0;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    mjx-container[display="true"] {
      margin: 2.0em 0 !important;
    }
  </style>

  <!-- MathJax for LaTeX rendering -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$']],
        displayMath: [['$$', '$$']],
        tags: 'ams',
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      },
      startup: {
        ready() {
          MathJax.startup.defaultReady();
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>

<body>
  <div class="blob-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <table style="width:100%;max-width:800px;border:0px;border-spacing:0px;border-collapse:separate;margin-right:auto;margin-left:auto;table-layout:fixed;">
    <tr>
      <td style="padding:2.5%;overflow-wrap:break-word;word-wrap:break-word;">

        <p><a href="{{ site.baseurl }}/">← Back to home</a></p>

        <h1>{{ page.title }}</h1>
        <p style="color:#999;font-size:0.85em;">{{ page.date | date: "%B %-d, %Y" }} · {{ page.author }}</p>

        {{ content }}

      </td>
    </tr>
  </table>

  <script>
    (function() {
      var links = document.links;
      for (var i = 0, linksLength = links.length; i < linksLength; i++) {
        if (links[i].hostname != window.location.hostname) {
          links[i].target = '_blank';
          links[i].rel = 'noopener noreferrer';
        }
      }
    })();
  </script>

</body>
</html>
